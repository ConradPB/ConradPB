name: generate animation

on:
  # Run automatically every day at midnight
  schedule:
    - cron: "0 0 * * *" 
  
  # Allows to manually run the job at any time from the "Actions" tab
  workflow_dispatch:
  
  # Run on every push on the main branch
  push:
    branches:
    - main
    
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generates a snake game from a github user (conradpb) contributions graph
      - name: generate github-contribution-grid-snake.svg
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23ff5f00&color_dots=%23161b22,%23402d1a,%23734a26,%23b3743a,%23ff9f4d

      # Push the content of <build_dir> to the "output" branch
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
